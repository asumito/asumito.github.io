                        >
                            asumito

                            class="text-xs text-gray-300 md:text-sm"
                        ></div>
                    </div>

                    <nav class="flex flex-wrap justify-center gap-6">
                        <a
                            href="about.html"
                            class="text-gray-200 hover:text-white transition-colors duration-300 font-medium"
                            rel="noopener noreferrer"

                            href="https://socials.asumito.com"
                            class="text-gray-200 hover:text-white transition-colors duration-300 font-medium"
                            rel="noopener noreferrer"

                        <a
                            href="https://github.com/asumito"
                            class="text-gray-200 hover:text-white transition-colors duration-300 font-medium"
                            rel="noopener noreferrer"

                            rel="noopener noreferrer"
                            >Blog</a

                    Hello there! 👋
                </h1>

                <p
                    id="quote-container"
                    class="text-lg md:text-xl text-gray-300 mb-4 max-w-lg"

                <div
                    class="text-sm text-gray-500 uppercase tracking-widest mt-4 pt-4 border-t border-gray-700"

                    asumito | STUDENT
                </div>

                <a
                    href="https://asumito.com/about"
                    class="mt-8 px-8 py-3 bg-blue-500 text-white font-semibold rounded-full shadow-lg hover:bg-blue-600 transition-all duration-300 transform hover:-translate-y-1"
                    rel="noopener noreferrer"
                >
                    Learn More About Me
